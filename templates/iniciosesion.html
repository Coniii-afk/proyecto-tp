<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="{{ url_for('inicio') }}">
                <img src="{{ url_for('static', filename='imgs/logo.png') }}" alt="Logo FindPets">
            </a>
        </div>
        <nav class="menu">
            <a href="{{ url_for('inicio') }}">
                Inicio
            </a>
            <a href="{{ url_for('buscarporcodigo') }}">
                Buscar mascota
            </a>
            <a href="{{ url_for('formulariomascota') }}">
                Registrar mascota
            </a>
            <a href="{{ url_for('murocomunitario') }}">
                Muro comunitario
            </a>
        </nav>
        <div class="botones">
            <a href="{{ url_for('iniciosesion') }}" class="boton iniciar">
                Iniciar sesión
            </a>
            <a href="{{ url_for('registrate') }}" class="boton registro">
                Registrarse
            </a>
        </div>
    </header>
    <main class="pagina-formulario">
        <section class="formulario">
            <div class="titulo-formulario">
                <h1>
                    Iniciar sesión
                </h1>
                <p>
                    Ingresa a tu cuenta para administrar tus mascotas.
                </p>
            </div>
            <form action="{{ url_for('iniciosesion') }}" method="POST" id="formularioLogin">
                <label for="correo">
                    Correo electrónico
                </label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@gmail.com" required>
                <label for="contrasena">
                    Contraseña
                </label>
                <div class="contrasena">
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña"
                        required>
                    <button type="button" id="mostrarContrasena">
                            °
                    </button>
                </div>
                <button type="submit" class="boton enviar">
                    Iniciar sesión
                </button>
            </form>
            <div class="enlace-formulario">
                <p>
                    ¿No tienes una cuenta?
                </p>
                <a href="{{ url_for('registrate') }}">
                    Crear cuenta
                </a>
            </div>
        </section>
    </main>
    <footer class="pie">
        <h3>
            FindPets
        </h3>
        <p>
            Ayudando a reunir mascotas con sus familias.
        </p>
        <p>
            © 2026 FindPets
        </p>
    </footer>
</body>
</html>
