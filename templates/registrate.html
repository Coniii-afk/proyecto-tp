<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="{{ url_for('inicio') }}">
                <img src="{{ url_for('static', filename='imgs/logo.png') }}" alt="Logo FindPets">
            </a>
        </div>
        <nav class="menu">
            <a href="{{ url_for('inicio') }}">
                Inicio
            </a>
            <a href="{{ url_for('buscarporcodigo') }}">
                Buscar mascota
            </a>

            <a href="{{ url_for('formulariomascota') }}">
                Registrar mascota
            </a>
            <a href="{{ url_for('murocomunitario') }}">
                Muro comunitario
            </a>
        </nav>
        <div class="botones">
            <a href="{{ url_for('iniciosesion') }}" class="boton iniciar">
                Iniciar sesión
            </a>
            <a href="{{ url_for('registrate') }}" class="boton registro">
                Registrarse
            </a>
        </div>
    </header>
    <main class="pagina-formulario">
        <section class="formulario">
            <div class="titulo-formulario">
                <h1>
                    Crear una cuenta
                </h1>
                <p>
                    Regístrate en FindPets y comienza a proteger a tu mascota.
                </p>
            </div>
            <form action="{{ url_for('registrate') }}" method="POST" id="formularioRegistro">
                <label for="nombre">
                    Nombre completo
                </label>
                <input type="text" id="nombre" name="nombre" placeholder="Ejemplo: Constanza Flores" required>
                <label for="correo">
                    Correo electrónico
                </label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@gmail.com" required>
                <label for="telefono">
                    Teléfono
                </label>
                <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
                <label for="direccion">
                    Dirección o comuna
                </label>
                <input type="text" id="direccion" name="direccion" placeholder="Ejemplo: Linares">
                <label for="contrasena">
                    Contraseña
                </label>
                <input type="password" id="contrasena" name="contrasena" placeholder="Crea una contraseña" required>
                <label for="confirmar">
                    Confirmar contraseña
                </label>
                <input type="password" id="confirmar" name="confirmar" placeholder="Repite tu contraseña" required>
                <button type="submit" class="boton enviar">
                    Crear cuenta
                </button>
            </form>
            <div class="enlace-formulario">
                <p>
                    ¿Ya tienes una cuenta?
                </p>
                <a href="{{ url_for('iniciosesion') }}">
                    Iniciar sesión
                </a>
            </div>
        </section>
    </main>
    <footer class="pie">
        <h3>
            FindPets
        </h3>
        <p>
            Ayudando a reunir mascotas con sus familias.
        </p>
        <p>
            © 2026 FindPets
        </p>
    </footer>
</body>
</html>
